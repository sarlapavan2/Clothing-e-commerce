<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pwd Reset Confirm</title>
</head>
<body>
    
    <section>
        <h2 style="text-align: center;">Enter new password</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Reset Password</button>
        </form>

    </section>

</body>
</html>
